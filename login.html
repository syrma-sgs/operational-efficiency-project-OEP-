<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Syrma SGS Operation Efficiency Project (OEP)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js" defer></script>

<style>
  /* -------- CSS RESET & VARIABLES -------- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark-bg: #050508;
    --dark-ceiling: #0a0a12;
    --lamp-yellow: #ffd97a;
    --lamp-glow: #ffb84d;
    --lamp-body: #c8a84b;
    --lamp-shade: #8b6914;
    --form-glass: rgba(255,255,255,0.04);
    --form-border: rgba(255,255,255,0.10);
    --accent: #6c63ff;
    --accent-hover: #5a52e0;
    --text-primary: #f0eeff;
    --text-muted: rgba(240,238,255,0.55);
    --error-red: #ff6b6b;
    --success-green: #6bcb77;
    --transition: cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    height: 100%;
    font-family: 'Inter', 'Sora', sans-serif;
    background: var(--dark-bg);
    color: var(--text-primary);
    overflow: hidden;
    user-select: none;
  }

  /* -------- ROOM / SCENE -------- */
  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: var(--dark-bg);
    transition: background 1.4s var(--transition);
  }
  .scene.lit {
    background: #0e0c1a;
  }

  /* -------- CEILING -------- */
  .ceiling {
    width: 100%;
    height: 90px;
    background: linear-gradient(180deg, #0d0c14 0%, #07070f 100%);
    position: relative;
    flex-shrink: 0;
  }

  /* -------- LAMP CORD -------- */
  .lamp-cord {
    width: 3px;
    height: 60px;
    background: linear-gradient(180deg, #4a4560 0%, #6b6490 100%);
    margin: 0 auto;
    border-radius: 2px;
    position: relative;
    left: 0;
    flex-shrink: 0;
  }

  /* -------- LAMP BODY -------- */
  .lamp-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    flex-shrink: 0;
  }

  .lamp-shade {
    width: 0;
    height: 0;
    border-left: 55px solid transparent;
    border-right: 55px solid transparent;
    border-bottom: 70px solid #3a2f0e;
    position: relative;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
  }
  .lamp-shade::after {
    content: '';
    position: absolute;
    top: 20px;
    left: -45px;
    right: -45px;
    height: 4px;
    background: var(--lamp-body);
    border-radius: 2px;
  }

  .lamp-bulb {
    width: 28px;
    height: 28px;
    background: #2a2410;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: relative;
    top: -4px;
    transition: background 0.6s var(--transition), box-shadow 0.6s var(--transition);
  }
  .lamp-bulb.on {
    background: var(--lamp-yellow);
    box-shadow:
      0 0 12px 6px var(--lamp-yellow),
      0 0 35px 18px rgba(255,180,50,0.55),
      0 0 80px 40px rgba(255,150,30,0.30);
  }

  /* -------- LIGHT CONE -------- */
  .light-cone {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 200px solid transparent;
    border-right: 200px solid transparent;
    border-top: 0px solid rgba(255,200,80,0);
    pointer-events: none;
    transition: border-top-width 1.2s var(--transition),
                border-top-color 1.2s var(--transition),
                opacity 1.2s var(--transition);
    opacity: 0;
  }
  .light-cone.on {
    border-top-width: 360px;
    border-top-color: rgba(255,200,80,0.09);
    opacity: 1;
  }

  /* -------- PULL STRING -------- */
  .pull-string-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    padding: 4px;
    margin-top: -6px;
    flex-shrink: 0;
  }
  .pull-string {
    width: 2px;
    height: 56px;
    background: linear-gradient(180deg, #9b8fcc 0%, #c9b8ff 100%);
    border-radius: 2px;
    position: relative;
    transition: transform 0.15s ease;
  }
  .pull-string-wrap:hover .pull-string {
    transform: scaleY(1.08);
  }
  .pull-string-wrap.pulling .pull-string {
    animation: pullAnim 0.4s ease;
  }
  @keyframes pullAnim {
    0%   { transform: scaleY(1); }
    30%  { transform: scaleY(1.25) translateY(8px); }
    70%  { transform: scaleY(0.9); }
    100% { transform: scaleY(1); }
  }
  .pull-bead {
    width: 10px;
    height: 10px;
    background: radial-gradient(circle at 35% 35%, #d0c0ff, #7b6dbf);
    border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    margin-top: 2px;
    transition: transform 0.15s ease;
  }
  .pull-string-wrap:hover .pull-bead {
    transform: scale(1.2);
  }
  .pull-hint {
    font-size: 11px;
    color: rgba(180,170,255,0.6);
    margin-top: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: opacity 0.5s;
  }
  .pull-hint.hide {
    opacity: 0;
    pointer-events: none;
  }

  /* -------- ROOM GLOW -------- */
  .room-glow {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 15%,
      rgba(255,190,60,0.0) 0%, transparent 100%);
    pointer-events: none;
    transition: background 1.4s var(--transition);
  }
  .room-glow.on {
    background: radial-gradient(ellipse 70% 55% at 50% 10%,
      rgba(255,190,60,0.10) 0%,
      rgba(255,170,50,0.04) 40%,
      transparent 100%);
  }

  /* -------- LOGIN CARD -------- */
  .login-wrap {
    width: 100%;
    max-width: 430px;
    padding: 0 20px;
    margin-top: 22px;
    opacity: 0;
    transform: translateY(24px);
    pointer-events: none;
    transition: opacity 0.9s var(--transition), transform 0.9s var(--transition);
    flex-shrink: 0;
  }
  .login-wrap.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .login-card {
    background: var(--form-glass);
    border: 1px solid var(--form-border);
    border-radius: 20px;
    padding: 36px 36px 32px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 24px 60px rgba(0,0,0,0.6),
      0 0 40px rgba(108,99,255,0.06);
  }

  /* -------- LOGO AREA -------- */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }
  .logo-icon {
    width: 46px;
    height: 46px;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(108,99,255,0.4);
    flex-shrink: 0;
  }
  .logo-icon svg {
    width: 24px;
    height: 24px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .logo-text h1 {
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .logo-text p {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.02em;
  }

  .login-heading {
    font-family: 'Sora', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .login-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  /* -------- FORM FIELDS -------- */
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 20px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .field label {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .field-input-wrap {
    position: relative;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .field input::placeholder { color: rgba(240,238,255,0.25); }
  .field input:focus {
    border-color: rgba(108,99,255,0.6);
    background: rgba(108,99,255,0.06);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  .field input.has-toggle {
    padding-right: 44px;
  }
  .pw-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }
  .pw-toggle:hover { color: var(--text-primary); }
  .pw-toggle svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* -------- ERROR BOX -------- */
  .error-box {
    background: rgba(255,107,107,0.10);
    border: 1px solid rgba(255,107,107,0.30);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--error-red);
    display: flex;
    align-items: flex-start;
    gap: 9px;
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .error-box.hidden { display: none; }
  .error-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

  /* -------- LOGIN BUTTON -------- */
  .btn-login {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #6c63ff, #8b83ff);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.40);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    position: relative;
    overflow: hidden;
  }
  .btn-login:hover:not(:disabled) {
    background: linear-gradient(135deg, #5a52e0, #7a72f0);
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(108,99,255,0.55);
  }
  .btn-login:active:not(:disabled) { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

  /* -------- SPINNER -------- */
  .spinner {
    width: 17px; height: 17px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-login .spinner { display: none; }
  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  /* -------- FOOTER NOTE -------- */
  .login-footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11.5px;
    color: rgba(240,238,255,0.25);
    line-height: 1.6;
  }

  /* -------- WALL TEXTURE -------- */
  .wall-texture {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.5;
    z-index: 0;
  }

  /* -------- STARS -------- */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .star {
    position: absolute;
    width: 1.5px;
    height: 1.5px;
    background: rgba(255,255,255,0.55);
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) var(--delay, 0s) ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.1; } to { opacity: 0.7; } }

  /* -------- FLEX SCENE LAYOUT -------- */
  .scene-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 30px;
    position: relative;
    z-index: 1;
  }

  /* -------- RESPONSIVE -------- */
  @media (max-width: 480px) {
    .login-card { padding: 28px 22px 24px; border-radius: 16px; }
    .login-heading { font-size: 19px; }
    .lamp-shade { border-left-width: 44px; border-right-width: 44px; border-bottom-width: 58px; }
    .light-cone { border-left-width: 160px; border-right-width: 160px; }
  }
</style>
</head>
<body>

<div class="wall-texture"></div>
<div class="stars" id="stars"></div>
<div class="room-glow" id="roomGlow"></div>

<div class="scene" id="scene">
  <div class="scene-inner">

    <!-- Ceiling -->
    <div class="ceiling"></div>

    <!-- Lamp cord -->
    <div class="lamp-cord"></div>

    <!-- Lamp -->
    <div class="lamp-wrap" id="lampWrap">
      <div class="lamp-shade" style="position:relative;">
        <!-- Light cone -->
        <div class="light-cone" id="lightCone"></div>
      </div>
      <div class="lamp-bulb" id="lampBulb"></div>
    </div>

    <!-- Pull string -->
    <div class="pull-string-wrap" id="pullStringWrap" role="button" tabindex="0" aria-label="Pull the lamp string to turn on the light">
      <div class="pull-string"></div>
      <div class="pull-bead"></div>
      <div class="pull-hint" id="pullHint">Pull to switch on</div>
    </div>

    <!-- Login Form (hidden until lamp is on) -->
    <div class="login-wrap" id="loginWrap">
      <div class="login-card">

        <!-- Logo -->
        <div class="logo-row">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M18.7 8.7 13 14.4l-3-3-4.7 4.7"/></svg>
          </div>
          <div class="logo-text">
            <h1>Syrma SGS Technology</h1>
            <p>Operation Efficiency Project (OEP)</p>
          </div>
        </div>

        <h2 class="login-heading">Welcome back</h2>
        <p class="login-sub">Sign in with your authorized credentials to continue.</p>

        <!-- Error -->
        <div class="error-box hidden" id="errorBox">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="errorMsg">Invalid email or password. Please try again.</span>
        </div>

        <!-- Fields -->
        <div class="field-group">
          <div class="field">
            <label for="emailInput">Email Address</label>
            <div class="field-input-wrap">
              <input type="email" id="emailInput" placeholder="you@syrma.com" autocomplete="email" required>
            </div>
          </div>
          <div class="field">
            <label for="passwordInput">Password</label>
            <div class="field-input-wrap">
              <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" class="has-toggle" required>
              <button class="pw-toggle" id="pwToggle" type="button" aria-label="Show / hide password" tabindex="-1">
                <!-- Eye icon (show) -->
                <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Submit -->
        <button class="btn-login" id="loginBtn" type="button">
          <span class="btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>

        <div class="login-footer">
          Only authorized users may access this system.<br>
          Contact your administrator if you need access.
        </div>

      </div>
    </div>

  </div><!-- /scene-inner -->
</div><!-- /scene -->

<script>
/* ====================================================================
   STARS GENERATOR
   ==================================================================== */
(function(){
  const container = document.getElementById('stars');
  for(let i = 0; i < 80; i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --dur:${2 + Math.random()*3}s;
      --delay:${Math.random()*3}s;
      width:${1 + Math.random()}px;
      height:${1 + Math.random()}px;
      opacity:${0.1 + Math.random()*0.5};
    `;
    container.appendChild(s);
  }
})();

/* ====================================================================
   LAMP INTERACTION
   ==================================================================== */
let lampOn = false;

function turnLampOn(){
  if(lampOn) return;
  lampOn = true;

  // Animate pull string
  const wrap = document.getElementById('pullStringWrap');
  wrap.classList.add('pulling');
  setTimeout(() => wrap.classList.remove('pulling'), 450);

  // Hide hint
  document.getElementById('pullHint').classList.add('hide');

  // After short delay, light up
  setTimeout(() => {
    document.getElementById('lampBulb').classList.add('on');
    document.getElementById('lightCone').classList.add('on');
    document.getElementById('scene').classList.add('lit');
    document.getElementById('roomGlow').classList.add('on');
  }, 300);

  // Show form
  setTimeout(() => {
    document.getElementById('loginWrap').classList.add('visible');
    document.getElementById('emailInput').focus();
  }, 900);
}

document.getElementById('pullStringWrap').addEventListener('click', turnLampOn);
document.getElementById('pullStringWrap').addEventListener('keydown', (e) => {
  if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); turnLampOn(); }
});

/* ====================================================================
   PASSWORD TOGGLE
   ==================================================================== */
document.getElementById('pwToggle').addEventListener('click', () => {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if(inp.type === 'password'){
    inp.type = 'text';
    // Eye-off icon
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
});

/* ====================================================================
   SUPABASE LOGIN
   ==================================================================== */
function showError(msg){
  const box = document.getElementById('errorBox');
  document.getElementById('errorMsg').textContent = msg;
  box.classList.remove('hidden');
}
function hideError(){
  document.getElementById('errorBox').classList.add('hidden');
}

document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') handleLogin();
});
document.getElementById('emailInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') document.getElementById('passwordInput').focus();
});

async function handleLogin(){
  hideError();
  const email    = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;

  if(!email || !password){
    showError('Please enter your email address and password.');
    return;
  }

  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    // Auth.signIn is available via auth.js (loaded with defer, so wait for it)
    const { session, error } = await window.Auth.signIn(email, password);

    if(error || !session){
      const msg = error?.message || 'Login failed.';
      // Provide a user-friendly message instead of raw Supabase error
      if(msg.toLowerCase().includes('invalid') || msg.toLowerCase().includes('credentials')){
        showError('Incorrect email or password. Please check your credentials and try again.');
      } else if(msg.toLowerCase().includes('email not confirmed')){
        showError('Your account has not been confirmed. Please contact your administrator.');
      } else {
        showError('Unable to sign in. Please try again or contact your administrator.');
      }
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    // Success — redirect to dashboard
    window.location.href = 'index.html';

  } catch(err){
    console.error('Login error:', err);
    showError('A network error occurred. Please check your connection and try again.');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

/* ====================================================================
   AUTO-REDIRECT if already logged in
   ==================================================================== */
window.addEventListener('load', async () => {
  // Auth is loaded via defer, so it should be ready by now
  if(window.Auth){
    const session = await window.Auth.getSession();
    if(session) window.location.href = 'index.html';
  }
});
